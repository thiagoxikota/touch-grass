<!--
  Touch Grass favicon.
  NOTE: Browsers render favicon SVGs outside any CSS context, so `currentColor` /
  CSS variables don't resolve. This is one of the only places we hardcode the
  brand hex — it MUST stay in sync with `--color-earned` in @touch-grass/tokens.
  If you change `color.earned` in tokens, update this file too.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none" stroke="#A6FF00" stroke-width="10" stroke-linecap="butt">
  <rect width="96" height="96" fill="#000000"/>
  <line x1="48" y1="84" x2="48" y2="12"/>
  <line x1="48" y1="84" x2="28" y2="20"/>
  <line x1="48" y1="84" x2="68" y2="20"/>
  <line x1="48" y1="84" x2="8" y2="32"/>
  <line x1="48" y1="84" x2="88" y2="32"/>
</svg>
